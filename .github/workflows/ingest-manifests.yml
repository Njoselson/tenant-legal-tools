name: Ingest Manifests to Production

on:
  push:
    branches:
      - main
    paths:
      - 'data/manifests/**/*.jsonl'
  workflow_dispatch:
    inputs:
      manifest_file:
        description: 'Specific manifest file to ingest (e.g., data/manifests/justia_100_cases.jsonl). Leave empty to ingest all changed files.'
        required: false
        type: string
      skip_existing:
        description: 'Skip already-processed sources'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      concurrency:
        description: 'Number of concurrent requests'
        required: false
        default: '3'
        type: string

jobs:
  ingest:
    name: Ingest Manifests to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to detect changed files
      
      - name: Detect changed manifest files
        id: detect-manifests
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger - use specified file or all manifests
            if [ -n "${{ github.event.inputs.manifest_file }}" ]; then
              MANIFEST_FILE="${{ github.event.inputs.manifest_file }}"
              if [ ! -f "$MANIFEST_FILE" ]; then
                echo "Error: Manifest file not found: $MANIFEST_FILE"
                exit 1
              fi
              echo "manifests=$MANIFEST_FILE" >> $GITHUB_OUTPUT
              echo "📋 Using specified manifest: $MANIFEST_FILE"
            else
              # Use all manifest files
              MANIFESTS=$(find data/manifests -name "*.jsonl" -type f | tr '\n' ' ')
              echo "manifests=$MANIFESTS" >> $GITHUB_OUTPUT
              echo "📋 Using all manifest files: $MANIFESTS"
            fi
          else
            # Push trigger - detect changed files
            echo "🔍 Detecting changed manifest files..."
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep 'data/manifests/.*\.jsonl$' || true)
            if [ -z "$CHANGED_FILES" ]; then
              echo "⚠️  No manifest files changed, skipping ingestion"
              echo "manifests=" >> $GITHUB_OUTPUT
              exit 0
            fi
            MANIFESTS=$(echo "$CHANGED_FILES" | tr '\n' ' ')
            echo "manifests=$MANIFESTS" >> $GITHUB_OUTPUT
            echo "📋 Changed manifest files: $MANIFESTS"
          fi
      
      - name: Setup SSH
        if: steps.detect-manifests.outputs.manifests != ''
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}
      
      - name: Add server to known hosts
        if: steps.detect-manifests.outputs.manifests != ''
        run: |
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Ingest manifests on production server
        if: steps.detect-manifests.outputs.manifests != ''
        timeout-minutes: 240  # 4 hours for large manifests
        env:
          MANIFEST_FILES: ${{ steps.detect-manifests.outputs.manifests }}
          SKIP_EXISTING: ${{ github.event.inputs.skip_existing || 'true' }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '3' }}
        run: |
          echo "🚀 Starting ingestion on production server..."
          
          # SSH to production server and run ingestion
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=3 ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "MANIFEST_FILES='${MANIFEST_FILES}' SKIP_EXISTING='${SKIP_EXISTING}' CONCURRENCY='${CONCURRENCY}' bash -s" << 'EOF'
            set -e
            
            # Navigate to project directory
            cd /opt/tenant_legal_guidance || { 
              echo "❌ Project directory not found at /opt/tenant_legal_guidance"
              exit 1
            }
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            git pull origin main || { echo "⚠️  Git pull failed, continuing with existing code"; }
            
            # Start services if not running
            echo "🔧 Checking Docker services..."
            if ! docker compose ps | grep -q "Up"; then
              echo "Starting Docker services..."
              docker compose up -d
              echo "⏳ Waiting for services to start..."
              sleep 15
            else
              echo "✅ Docker services already running"
            fi
            
            # Process each manifest file
            MANIFEST_LIST=$(echo "$MANIFEST_FILES" | tr ' ' '\n')
            for MANIFEST_FILE in $MANIFEST_LIST; do
              if [ ! -f "$MANIFEST_FILE" ]; then
                echo "⚠️  Manifest file not found: $MANIFEST_FILE, skipping"
                continue
              fi
              
              echo ""
              echo "📄 Processing manifest: $MANIFEST_FILE"
              echo "=========================================="
              
              # Run ingestion via docker compose
              docker compose exec -T app python -m tenant_legal_guidance.scripts.ingest \
                --manifest "$MANIFEST_FILE" \
                --concurrency "$CONCURRENCY" \
                --skip-existing \
                --checkpoint "data/ingestion_checkpoint_$(basename $MANIFEST_FILE .jsonl).json" \
                --report "data/ingestion_report_$(basename $MANIFEST_FILE .jsonl).json" \
                || { echo "❌ Ingestion failed for $MANIFEST_FILE"; exit 1; }
              
              echo "✅ Completed ingestion for $MANIFEST_FILE"
            done
            
            echo ""
            echo "✅ All manifest files processed successfully"
          EOF
      
      - name: Get ingestion summary
        if: steps.detect-manifests.outputs.manifests != ''
        run: |
          echo "📊 Retrieving ingestion summary..."
          ssh -o ServerAliveInterval=60 ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "cd /opt/tenant_legal_guidance && docker compose exec -T app python -m tenant_legal_guidance.scripts.reset_database --stats" || echo "⚠️  Could not retrieve stats"
      
      - name: Report success
        if: steps.detect-manifests.outputs.manifests != ''
        run: |
          echo "✅ Manifest ingestion completed successfully"
          echo "📋 Processed manifest files: ${{ steps.detect-manifests.outputs.manifests }}"

