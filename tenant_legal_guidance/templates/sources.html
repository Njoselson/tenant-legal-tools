<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sources</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
            background-color: #f8f9fa;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
            text-align: center;
        }
        nav {
            margin-bottom: 20px;
            text-align: center;
            background: #34495e;
            padding: 10px;
            border-radius: 5px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover { text-decoration: underline; }

        .manifest-card {
            background: #fff;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .manifest-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            background: #fafbfc;
            border-bottom: 1px solid #ecf0f1;
        }
        .manifest-header:hover { background: #f0f3f5; }
        .manifest-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: #2c3e50;
        }
        .manifest-count {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-left: 8px;
        }
        .manifest-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-ingest {
            background: #2ecc71;
            color: white;
        }
        .btn-ingest:hover:not(:disabled) { background: #27ae60; }
        .btn-ingest:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .chevron {
            font-size: 0.8rem;
            color: #95a5a6;
            transition: transform 0.2s;
            margin-right: 10px;
        }
        .manifest-card.expanded .chevron { transform: rotate(90deg); }

        .manifest-entries {
            display: none;
            padding: 0;
        }
        .manifest-card.expanded .manifest-entries { display: block; }

        .entry-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .entry-table th {
            text-align: left;
            padding: 8px 14px;
            background: #f7f9fa;
            color: #7f8c8d;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #ecf0f1;
        }
        .entry-table td {
            padding: 7px 14px;
            border-bottom: 1px solid #f4f5f6;
            vertical-align: middle;
        }
        .entry-table tr:last-child td { border-bottom: none; }
        .entry-table tr:hover td { background: #fafbfc; }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .dot-ingested { background: #2ecc71; }
        .dot-pending { background: #bdc3c7; }
        .dot-loading { background: #f39c12; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .entry-link {
            color: #3498db;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .entry-link:hover { text-decoration: underline; }

        .entry-title {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Job progress banner */
        .job-banner {
            display: none;
            background: #eaf5ff;
            border: 1px solid #aed6f1;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 16px;
        }
        .job-banner.visible { display: block; }
        .job-banner.completed {
            background: #e8f8f5;
            border-color: #a9dfbf;
        }
        .job-banner.failed {
            background: #fdedec;
            border-color: #f5b7b1;
        }
        .job-banner-text {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        .progress-bar-container {
            background: #dfe6e9;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar {
            background: #3498db;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .progress-stats {
            font-size: 0.82rem;
            color: #7f8c8d;
            margin-top: 6px;
        }

        .loading-msg {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <h1>Sources</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/kg-view">KG View</a>
        <a href="/sources">Sources</a>
    </nav>

    <div id="job-banner" class="job-banner">
        <div class="job-banner-text" id="job-text">Processing...</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="job-progress" style="width: 0%"></div>
        </div>
        <div class="progress-stats" id="job-stats"></div>
    </div>

    <div id="manifests-container">
        <div class="loading-msg">Loading manifests...</div>
    </div>

    <script>
        const statusCache = {};
        let activeJobs = {};

        async function loadManifests() {
            try {
                const res = await fetch('/api/v1/curation/manifest-files');
                const data = await res.json();
                renderManifests(data.files || []);
            } catch (err) {
                document.getElementById('manifests-container').innerHTML =
                    '<div class="loading-msg" style="color:#e74c3c">Failed to load manifests: ' + err.message + '</div>';
            }
        }

        function renderManifests(files) {
            const container = document.getElementById('manifests-container');
            if (!files.length) {
                container.innerHTML = '<div class="loading-msg">No manifest files found in data/manifests/</div>';
                return;
            }
            container.innerHTML = files.map((f, i) => `
                <div class="manifest-card" data-idx="${i}" data-filename="${f.filename}">
                    <div class="manifest-header" onclick="toggleCard(${i})">
                        <div>
                            <span class="chevron">&#9654;</span>
                            <span class="manifest-title">${f.filename.replace('.jsonl', '').replace(/_/g, ' ')}</span>
                            <span class="manifest-count">(${f.entry_count} entries)</span>
                        </div>
                        <div class="manifest-actions">
                            <button class="btn btn-ingest" onclick="event.stopPropagation(); ingestManifest('${f.filename}', this)">Ingest All</button>
                        </div>
                    </div>
                    <div class="manifest-entries" id="entries-${i}">
                        ${renderEntries(f.entries, f.filename)}
                    </div>
                </div>
            `).join('');
        }

        function renderEntries(entries, filename) {
            if (!entries.length) return '<div style="padding:14px;color:#95a5a6">No entries</div>';
            return `<table class="entry-table">
                <thead><tr>
                    <th></th>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Authority</th>
                    <th></th>
                </tr></thead>
                <tbody>${entries.map((e, j) => {
                    const dotId = `dot-${filename}-${j}`;
                    return `<tr>
                        <td><span class="status-dot dot-loading" id="${dotId}"></span></td>
                        <td class="entry-title" title="${(e.title || e.locator).replace(/"/g, '&quot;')}">${e.title || e.locator}</td>
                        <td>${e.document_type || '-'}</td>
                        <td>${(e.authority || '-').replace(/_/g, ' ')}</td>
                        <td><a class="entry-link" href="${e.locator}" target="_blank" rel="noopener">link</a></td>
                    </tr>`;
                }).join('')}</tbody>
            </table>`;
        }

        async function toggleCard(idx) {
            const card = document.querySelector(`.manifest-card[data-idx="${idx}"]`);
            const wasExpanded = card.classList.contains('expanded');
            card.classList.toggle('expanded');

            if (!wasExpanded) {
                const filename = card.dataset.filename;
                if (!statusCache[filename]) {
                    await checkStatus(card, filename);
                } else {
                    applyStatus(filename);
                }
            }
        }

        async function checkStatus(card, filename) {
            const table = card.querySelector('.entry-table');
            if (!table) return;

            const rows = table.querySelectorAll('tbody tr');
            const locators = [];
            rows.forEach((row, j) => {
                const link = row.querySelector('.entry-link');
                if (link) locators.push(link.href);
            });

            try {
                const res = await fetch('/api/v1/curation/check-ingested', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({locators})
                });
                const data = await res.json();
                statusCache[filename] = data.ingested || {};
                applyStatus(filename);
            } catch (err) {
                console.error('Status check failed:', err);
            }
        }

        function applyStatus(filename) {
            const ingested = statusCache[filename] || {};
            const card = document.querySelector(`.manifest-card[data-filename="${filename}"]`);
            if (!card) return;

            const rows = card.querySelectorAll('.entry-table tbody tr');
            rows.forEach((row, j) => {
                const dot = document.getElementById(`dot-${filename}-${j}`);
                const link = row.querySelector('.entry-link');
                if (dot && link) {
                    dot.classList.remove('dot-loading');
                    if (ingested[link.href]) {
                        dot.classList.add('dot-ingested');
                    } else {
                        dot.classList.add('dot-pending');
                    }
                }
            });
        }

        async function ingestManifest(filename, btn) {
            btn.disabled = true;
            btn.textContent = 'Starting...';

            try {
                const res = await fetch('/api/v1/curation/ingest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        manifest_path: `data/manifests/${filename}`,
                        options: {skip_existing: true}
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Ingest failed');

                btn.textContent = 'Running...';
                activeJobs[data.job_id] = filename;
                showJobBanner(data.job_id, filename);
                pollJob(data.job_id, filename, btn);
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Ingest All';
                alert('Ingest error: ' + err.message);
            }
        }

        function showJobBanner(jobId, filename) {
            const banner = document.getElementById('job-banner');
            const label = filename.replace('.jsonl', '').replace(/_/g, ' ');
            document.getElementById('job-text').textContent = `Processing ${label}...`;
            document.getElementById('job-progress').style.width = '0%';
            document.getElementById('job-stats').textContent = '';
            banner.className = 'job-banner visible';
        }

        async function pollJob(jobId, filename, btn) {
            try {
                const res = await fetch(`/api/v1/curation/jobs/${jobId}`);
                const data = await res.json();
                const p = data.progress || {};
                const total = p.total || 1;
                const processed = (p.processed || 0) + (p.skipped || 0) + (p.failed || 0);
                const pct = Math.min(100, Math.round((processed / total) * 100));

                document.getElementById('job-progress').style.width = pct + '%';
                const parts = [`${processed}/${total}`];
                if (p.skipped) parts.push(`${p.skipped} skipped`);
                if (p.failed) parts.push(`${p.failed} failed`);
                document.getElementById('job-stats').textContent = parts.join(', ');

                if (data.status === 'completed') {
                    const banner = document.getElementById('job-banner');
                    const label = filename.replace('.jsonl', '').replace(/_/g, ' ');
                    document.getElementById('job-text').textContent = `Done: ${label}`;
                    banner.className = 'job-banner visible completed';
                    btn.disabled = false;
                    btn.textContent = 'Ingest All';
                    delete statusCache[filename];
                    // Re-check status for this manifest
                    const card = document.querySelector(`.manifest-card[data-filename="${filename}"]`);
                    if (card && card.classList.contains('expanded')) {
                        checkStatus(card, filename);
                    }
                    return;
                } else if (data.status === 'failed') {
                    const banner = document.getElementById('job-banner');
                    document.getElementById('job-text').textContent = 'Ingestion failed';
                    banner.className = 'job-banner visible failed';
                    btn.disabled = false;
                    btn.textContent = 'Ingest All';
                    return;
                }

                setTimeout(() => pollJob(jobId, filename, btn), 3000);
            } catch (err) {
                console.error('Poll error:', err);
                setTimeout(() => pollJob(jobId, filename, btn), 5000);
            }
        }

        loadManifests();
    </script>
</body>
</html>
