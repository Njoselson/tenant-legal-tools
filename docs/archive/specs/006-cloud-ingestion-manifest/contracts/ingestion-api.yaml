openapi: 3.0.3
info:
  title: Cloud Database Ingestion API
  description: Web-based document ingestion with automatic manifest management
  version: 1.0.0
  contact:
    name: Tenant Legal Guidance System

servers:
  - url: http://localhost:8000
    description: Local development server
  - url: https://api.example.com
    description: Production server

paths:
  /api/ingest/upload:
    post:
      summary: Upload file for ingestion
      description: Upload a file (PDF, TXT, HTML) for ingestion into the knowledge graph
      operationId: uploadFile
      tags:
        - Ingestion
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (PDF, TXT, HTML, max 50MB)
                title:
                  type: string
                  description: Document title (optional)
                jurisdiction:
                  type: string
                  description: Legal jurisdiction (e.g., "NYC", "NY State")
                authority:
                  type: string
                  enum: [PRIMARY_LAW, BINDING_PRECEDENT, ADMINISTRATIVE_GUIDANCE, PRACTICAL_SELF_HELP, INFORMATIONAL_ONLY]
                  description: Source authority level
                document_type:
                  type: string
                  description: Document type (e.g., "STATUTE", "CASE_LAW", "SELF_HELP_GUIDE")
                organization:
                  type: string
                  description: Publishing organization
                tags:
                  type: string
                  description: Comma-separated tags
                notes:
                  type: string
                  description: Additional notes
      responses:
        '200':
          description: File uploaded and processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResponse'
        '400':
          description: Invalid file or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ingest/url:
    post:
      summary: Submit URL for ingestion
      description: Submit a URL to fetch and ingest into the knowledge graph
      operationId: submitUrl
      tags:
        - Ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UrlIngestionRequest'
      responses:
        '200':
          description: URL submitted and processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResponse'
        '400':
          description: Invalid URL or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ingest/batch:
    post:
      summary: Submit multiple documents for ingestion
      description: Submit multiple files and/or URLs for batch ingestion
      operationId: submitBatch
      tags:
        - Ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchIngestionRequest'
      responses:
        '200':
          description: Batch submitted and processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestionResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ingest/status/{request_id}:
    get:
      summary: Get ingestion status
      description: Get the current status of an ingestion request
      operationId: getIngestionStatus
      tags:
        - Ingestion
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Ingestion request ID
      responses:
        '200':
          description: Ingestion status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionStatusResponse'
        '404':
          description: Request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/manifest:
    get:
      summary: View manifest entries
      description: Get manifest entries with optional search and filtering
      operationId: getManifestEntries
      tags:
        - Manifest
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search term (searches in title, locator, notes)
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failed, partial]
          description: Filter by processing status
        - name: document_type
          in: query
          schema:
            type: string
          description: Filter by document type
        - name: jurisdiction
          in: query
          schema:
            type: string
          description: Filter by jurisdiction
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of entries to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Offset for pagination
      responses:
        '200':
          description: Manifest entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestListResponse'

  /api/manifest/export:
    get:
      summary: Export manifest as JSONL
      description: Download the complete manifest file in JSONL format
      operationId: exportManifest
      tags:
        - Manifest
      responses:
        '200':
          description: Manifest file (JSONL)
          content:
            application/x-ndjson:
              schema:
                type: string
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="sources.jsonl"

  /api/manifest/reingest:
    post:
      summary: Re-ingest selected manifest entries
      description: Re-process selected manifest entries
      operationId: reingestManifestEntries
      tags:
        - Manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReingestRequest'
      responses:
        '200':
          description: Re-ingestion started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReingestResponse'

  /api/manifest/entries/{entry_id}:
    delete:
      summary: Delete manifest entry
      description: Remove an entry from the manifest file
      operationId: deleteManifestEntry
      tags:
        - Manifest
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
          description: Manifest entry identifier (source_hash or line number)
      responses:
        '200':
          description: Entry deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/db/config:
    get:
      summary: Get database configuration (Admin only)
      description: View database connection settings (admin access required)
      operationId: getDbConfig
      tags:
        - Admin
      security:
        - AdminAuth: []
      responses:
        '200':
          description: Database configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseConfigResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Update database configuration (Admin only)
      description: Update database connection settings (admin access required)
      operationId: updateDbConfig
      tags:
        - Admin
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseConfigUpdate'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseConfigResponse'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    IngestionResponse:
      type: object
      required:
        - request_id
        - status
      properties:
        request_id:
          type: string
          format: uuid
          description: Unique identifier for the ingestion request
        status:
          type: string
          enum: [pending, processing]
          description: Initial status of the request
        message:
          type: string
          description: Status message

    UrlIngestionRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: URL to fetch and ingest
        title:
          type: string
        jurisdiction:
          type: string
        authority:
          type: string
          enum: [PRIMARY_LAW, BINDING_PRECEDENT, ADMINISTRATIVE_GUIDANCE, PRACTICAL_SELF_HELP, INFORMATIONAL_ONLY]
        document_type:
          type: string
        organization:
          type: string
        tags:
          type: array
          items:
            type: string
        notes:
          type: string

    BatchIngestionRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            oneOf:
              - type: object
                required: [url]
                properties:
                  type:
                    type: string
                    enum: [url]
                  url:
                    type: string
                    format: uri
                  metadata:
                    $ref: '#/components/schemas/Metadata'
              - type: object
                required: [file]
                properties:
                  type:
                    type: string
                    enum: [file]
                  file:
                    type: string
                    format: binary
                  metadata:
                    $ref: '#/components/schemas/Metadata'

    BatchIngestionResponse:
      type: object
      required:
        - request_ids
        - total
      properties:
        request_ids:
          type: array
          items:
            type: string
            format: uuid
        total:
          type: integer
          description: Total number of items submitted

    IngestionStatusResponse:
      type: object
      required:
        - request_id
        - status
      properties:
        request_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
        progress_percentage:
          type: integer
          minimum: 0
          maximum: 100
        current_stage:
          type: string
          enum: [uploaded, fetched, chunked, entities_extracted, proof_chains_built, stored_in_graph_db, stored_in_vector_db, completed]
        error_message:
          type: string
        timestamps:
          type: object
          properties:
            submitted_at:
              type: string
              format: date-time
            processing_started_at:
              type: string
              format: date-time
            processing_completed_at:
              type: string
              format: date-time

    ManifestEntry:
      type: object
      required:
        - locator
        - kind
        - source_hash
        - ingestion_timestamp
        - processing_status
      properties:
        locator:
          type: string
        kind:
          type: string
          enum: [URL, FILE, INTERNAL, MANUAL]
        title:
          type: string
        jurisdiction:
          type: string
        authority:
          type: string
        document_type:
          type: string
        organization:
          type: string
        tags:
          type: array
          items:
            type: string
        notes:
          type: string
        source_hash:
          type: string
          pattern: '^[a-f0-9]{64}$'
          description: SHA256 hash
        ingestion_timestamp:
          type: string
          format: date-time
        processing_status:
          type: string
          enum: [success, failed, partial]
        error_details:
          type: string
        entity_count:
          type: integer
        vector_count:
          type: integer
        request_id:
          type: string
          format: uuid

    ManifestListResponse:
      type: object
      required:
        - entries
        - total
        - limit
        - offset
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ManifestEntry'
        total:
          type: integer
          description: Total number of entries matching filters
        limit:
          type: integer
        offset:
          type: integer

    ReingestRequest:
      type: object
      required:
        - entry_ids
      properties:
        entry_ids:
          type: array
          items:
            type: string
          description: List of manifest entry identifiers (source_hash values)

    ReingestResponse:
      type: object
      required:
        - request_ids
        - total
      properties:
        request_ids:
          type: array
          items:
            type: string
            format: uuid
        total:
          type: integer

    DeleteResponse:
      type: object
      required:
        - deleted
      properties:
        deleted:
          type: boolean
        entry_id:
          type: string

    DatabaseConfigResponse:
      type: object
      required:
        - graph_database
        - vector_database
      properties:
        graph_database:
          $ref: '#/components/schemas/DatabaseConfig'
        vector_database:
          $ref: '#/components/schemas/DatabaseConfig'

    DatabaseConfig:
      type: object
      required:
        - database_type
        - host
        - database_name
        - connection_status
      properties:
        database_type:
          type: string
          enum: [graph_database, vector_database]
        host:
          type: string
        port:
          type: integer
        database_name:
          type: string
        collection_name:
          type: string
        connection_status:
          type: string
          enum: [active, inactive, error]
        last_verified_timestamp:
          type: string
          format: date-time
        storage_statistics:
          type: object
          properties:
            entity_count:
              type: integer
            vector_count:
              type: integer
            storage_size:
              type: integer
              description: Size in bytes

    DatabaseConfigUpdate:
      type: object
      required:
        - database_type
        - host
        - database_name
      properties:
        database_type:
          type: string
          enum: [graph_database, vector_database]
        host:
          type: string
        port:
          type: integer
        database_name:
          type: string
        collection_name:
          type: string
        credentials:
          type: object
          required:
            - username
            - password
          properties:
            username:
              type: string
            password:
              type: string

    Metadata:
      type: object
      properties:
        title:
          type: string
        jurisdiction:
          type: string
        authority:
          type: string
        document_type:
          type: string
        organization:
          type: string
        tags:
          type: array
          items:
            type: string
        notes:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        detail:
          type: string
        code:
          type: string

  securitySchemes:
    AdminAuth:
      type: http
      scheme: bearer
      description: Admin authentication (implementation deferred to existing auth system)

