<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Viewer</title>
    <!-- Import vis-network library -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent body scrollbars */
            background-color: #f0f2f5;
        }
        h1, h2, h3 {
             color: #2c3e50;
             margin-top: 0;
        }
        .page-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }
        .container {
            display: flex;
            flex: 1;
            min-height: 0; /* Allow flex children to shrink below content size */
            width: 100%;
        }
        #graph-container {
            flex-grow: 1; /* Takes up remaining space */
            height: 100%;
            border-right: 2px solid #d1d9e6;
            background-color: #ffffff;
        }
        #sidebar {
            width: 350px; /* Fixed width for sidebar */
            flex-shrink: 0; /* Prevent sidebar from shrinking */
            height: 100%;
            overflow-y: auto; /* Allow scrolling within sidebar */
            background-color: #f8f9fa;
            padding: 20px;
            box-sizing: border-box; /* Include padding in width */
            display: flex;
            flex-direction: column;
        }
        #details-panel {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            flex-shrink: 1;
            min-height: 60px;
            max-height: 50%;
            overflow-y: auto;
            transition: none; /* No layout transitions that cause flicker */
        }
        #details-panel h3 {
             margin-bottom: 10px;
             padding-bottom: 5px;
             border-bottom: 1px solid #ced4da;
        }
         #details-panel p {
             margin: 5px 0;
             word-wrap: break-word; /* Wrap long text */
         }
         #details-panel code {
             background-color: #d1d9e6;
             padding: 2px 4px;
             border-radius: 3px;
             font-size: 0.9em;
         }

        #chat-container {
            flex-grow: 1; /* Takes remaining space in sidebar */
            display: flex;
            flex-direction: column;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            background-color: #fff;
            overflow: hidden; /* Clip content */
        }
        #chat-log {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .chat-message {
             margin-bottom: 10px;
             padding: 8px 12px;
             border-radius: 15px;
             max-width: 80%;
             word-wrap: break-word;
         }
         .user-message {
             background-color: #3498db;
             color: white;
             margin-left: auto; /* Align right */
             border-bottom-right-radius: 5px;
         }
         .bot-message {
             background-color: #ecf0f1;
             color: #333;
             margin-right: auto; /* Align left */
              border-bottom-left-radius: 5px;
         }
        #chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #d1d9e6;
            background-color: #f8f9fa;
        }
        #chat-input {
            flex-grow: 1;
            padding: 8px 10px;
            border: 1px solid #ced4da;
            border-radius: 15px;
            margin-right: 8px;
            font-size: 0.95rem;
        }
        #send-btn {
            padding: 8px 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }
         #send-btn:hover {
              background-color: #27ae60;
         }
         nav {
             background: #2c3e50;
             padding: 10px 0;
             text-align: center;
             flex-shrink: 0;
         }
         nav a {
             color: #ecf0f1;
             text-decoration: none;
             margin: 0 15px;
             font-weight: bold;
             font-size: 0.9em;
         }
         nav a:hover {
             color: #3498db;
         }

        /* Actions panel */
        #actions-panel {
            background-color: #ffffff;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }
        #actions-panel h3 {
            margin-top: 0;
            font-size: 1.05rem;
        }
        .actions-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .danger {
            background-color: #e74c3c;
            color: #fff;
        }
        .danger:disabled {
            background-color: #f1a9a0;
            cursor: not-allowed;
        }
        .hint {
            color: #6c757d;
            font-size: 0.85rem;
            margin: 0;
        }

    </style>
</head>
<body>
    <div class="page-wrapper">
    <nav>
        <a href="/">Home</a>
        <a href="/kg-view">KG View</a>
        <a href="/sources">Sources</a>
    </nav>
    <div class="container">
        <div id="graph-container"></div>
        <div id="sidebar">
            <h2>Graph Details & Chat</h2>
            <div id="actions-panel">
                <h3 style="cursor:pointer;" onclick="document.getElementById('actions-advanced').classList.toggle('hidden')">
                    Actions ▼
                </h3>
                <div id="actions-advanced">
                    <div class="actions-row">
                        <button id="delete-selected-btn" class="action-btn danger" disabled>Delete</button>
                        <button id="expand-btn" class="action-btn" disabled>Expand</button>
                        <button id="consolidate-btn" class="action-btn" disabled>Consolidate</button>
                    </div>
                    <div class="actions-row">
                        <button id="load-more-btn" class="action-btn">Load More</button>
                    </div>
                    <div class="actions-row" style="margin-top:8px;">
                        <input id="filter-q" placeholder="Search..." style="flex:1; padding:6px; border:1px solid #ced4da; border-radius:6px; font-size:0.9em;" />
                        <button id="apply-filters-btn" class="action-btn">Search</button>
                    </div>
                    <details style="margin-top:8px;">
                        <summary style="cursor:pointer; font-size:0.85em; color:#6c757d;">Advanced Filters</summary>
                        <div style="margin-top:6px;">
                            <input id="filter-types" placeholder="Entity types (comma)" style="width:100%; padding:6px; border:1px solid #ced4da; border-radius:6px; font-size:0.9em; margin-bottom:6px;" />
                            <input id="filter-jurisdiction" placeholder="Jurisdiction" style="width:100%; padding:6px; border:1px solid #ced4da; border-radius:6px; font-size:0.9em; margin-bottom:6px;" />
                            <button id="consolidate-all-btn" class="action-btn" style="width:100%;">Consolidate All</button>
                        </div>
                    </details>
                    <p class="hint">Tip: Cmd/Ctrl + Click to multi-select</p>
                </div>
            </div>
            <div id="pagination-info" style="background-color: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 0.9em; color: #495057;">
                <strong>Graph Status:</strong> <span id="pagination-text">Loading...</span>
            </div>
            <style>
                .hidden { display: none; }
            </style>
            <div id="details-panel">
                <h3>Selection Details</h3>
                <p>Click on a node or edge to see details here.</p>
            </div>
            <div id="chat-container">
                <div id="chat-log">
                     <div class="bot-message">Hello! Ask me questions about the graph or selected items. (Editing not yet implemented).</div>
                </div>
                <div id="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Ask about the graph...">
                    <button id="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script type="text/javascript">
        const graphContainer = document.getElementById('graph-container');
        const detailsPanel = document.getElementById('details-panel');
        const chatLog = document.getElementById('chat-log');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const deleteSelectedBtn = document.getElementById('delete-selected-btn');
        const expandBtn = document.getElementById('expand-btn');
        const consolidateBtn = document.getElementById('consolidate-btn');
        const consolidateAllBtn = document.getElementById('consolidate-all-btn');
        let network = null;
        let graphData = { nodes: [], edges: [] }; // raw arrays
        let nodesDs = null; // vis DataSet for nodes
        let edgesDs = null; // vis DataSet for edges
        let selectedNodeId = null;
        let selectedEdgeId = null;
        let selectedNodeIds = new Set();
        let nextCursor = null;
        let activeFilters = { q: null, types: null, jurisdiction: null };
        let totalNodeCount = null; // Total nodes in graph (if available from API)
        let loadedNodeCount = 0; // Total nodes currently loaded

        // --- Entity Type Styling ---
        const entityColors = {
            // Claim proving entities (primary)
            LEGAL_CLAIM: '#3498db',      // Blue - legal claims
            EVIDENCE: '#2ecc71',          // Green - evidence
            LEGAL_OUTCOME: '#9b59b6',     // Purple - outcomes
            DAMAGES: '#e67e22',           // Orange - damages
            CLAIM_TYPE: '#1abc9c',        // Teal - claim types
            // Legacy entity types
            TENANT_ISSUE: '#e74c3c',
            STATUTE: '#2980b9',
            REGULATION: '#3498db',
            CASE: '#f1c40f',
            REMEDY: '#2ecc71',
            EVIDENCE_TYPE: '#9b59b6',
            LEGAL_PROCEDURE: '#e67e22',
            LEGAL_CONCEPT: '#1abc9c',
            JURISDICTION: '#7f8c8d',
            TEXT_CHUNK: '#95a5a6',
            LAW: '#2980b9',
            DEFAULT: '#bdc3c7',
        };

         const entityShapes = {
            // Claim proving entities (primary)
            LEGAL_CLAIM: 'diamond',       // Diamond - claims stand out
            EVIDENCE: 'dot',              // Dot - evidence items
            LEGAL_OUTCOME: 'star',        // Star - outcomes are important
            DAMAGES: 'triangle',          // Triangle - damages
            CLAIM_TYPE: 'hexagon',        // Hexagon - taxonomy
            // Legacy entity types
            TENANT_ISSUE: 'star',
            STATUTE: 'box',
            REGULATION: 'box',
            CASE: 'ellipse',
            REMEDY: 'diamond',
            EVIDENCE_TYPE: 'triangle',
            LEGAL_PROCEDURE: 'hexagon',
            LEGAL_CONCEPT: 'dot',
            JURISDICTION: 'square',
            TEXT_CHUNK: 'box',
            LAW: 'box',
            DEFAULT: 'ellipse'
         };

        function normalizeTypeKey(typeStr) {
            if (!typeStr) return 'DEFAULT';
            const upper = String(typeStr).toUpperCase();
            const map = {
                // Claim proving entities (primary)
                'LEGAL_CLAIM': 'LEGAL_CLAIM', 'legal_claim': 'LEGAL_CLAIM',
                'EVIDENCE': 'EVIDENCE', 'evidence': 'EVIDENCE',
                'LEGAL_OUTCOME': 'LEGAL_OUTCOME', 'legal_outcome': 'LEGAL_OUTCOME',
                'DAMAGES': 'DAMAGES', 'damages': 'DAMAGES',
                'CLAIM_TYPE': 'CLAIM_TYPE', 'claim_type': 'CLAIM_TYPE',
                // Legacy entity types
                'TENANT_ISSUE': 'TENANT_ISSUE', 'tenant_issue': 'TENANT_ISSUE',
                'LAW': 'LAW', 'law': 'LAW',
                'REGULATION': 'REGULATION', 'regulation': 'REGULATION',
                'COURT_CASE': 'CASE', 'court_case': 'CASE',
                'REMEDY': 'REMEDY', 'remedy': 'REMEDY',
                'EVIDENCE_TYPE': 'EVIDENCE', 'evidence_type': 'EVIDENCE',
                'LEGAL_PROCEDURE': 'LEGAL_PROCEDURE', 'legal_procedure': 'LEGAL_PROCEDURE',
                'LEGAL_CONCEPT': 'LEGAL_CONCEPT', 'legal_concept': 'LEGAL_CONCEPT',
                'JURISDICTION': 'JURISDICTION', 'jurisdiction': 'JURISDICTION',
                'TEXT_CHUNK': 'TEXT_CHUNK', 'text_chunk': 'TEXT_CHUNK'
            };
            return map[typeStr] || map[upper] || 'DEFAULT';
        }

        // --- Vis.js Network Initialization ---
        // Note: Graph uses pagination to handle large graphs efficiently.
        // Initial load: 10,000 nodes (increased from 100)
        // API limit: 100,000 nodes (increased from 200)
        // Use "Load More" button to load additional pages incrementally.
        async function initializeGraph() {
            try {
                console.log("Fetching graph data (first page)...");
                nextCursor = null;
                loadedNodeCount = 0; // Reset loaded count when reinitializing
                totalNodeCount = null; // Reset total count
                const params = new URLSearchParams();
                params.set('limit', '10000'); // Increased from 100 to allow loading larger graphs
                if (activeFilters.q) params.set('q', activeFilters.q);
                if (activeFilters.types) params.set('types', activeFilters.types);
                if (activeFilters.jurisdiction) params.set('jurisdiction', activeFilters.jurisdiction);
                const graphResponse = await fetch(`/api/kg/graph-data?${params.toString()}`);
                
                if (!graphResponse.ok) {
                    throw new Error(`Graph data HTTP error! Status: ${graphResponse.status}`);
                }
                
                const rawData = await graphResponse.json();
                nextCursor = rawData.next_cursor ?? null;
                totalNodeCount = rawData.total_count ?? null;
                loadedNodeCount = rawData.loaded_count ?? rawData.nodes?.length ?? 0;
                
                console.log(`Received ${rawData.nodes?.length} nodes, ${rawData.links?.length} links.`);
                updatePaginationInfo();

                // Process entity nodes for vis-network
                const entityNodes = rawData.nodes.map(node => {
                    // Check if node has chunks/quotes (look in both node and attributes)
                    const hasChunks = (node.chunk_ids && node.chunk_ids.length > 0) || 
                                     (node.attributes && node.attributes.chunk_ids && node.attributes.chunk_ids.length > 0);
                    const hasQuote = node.best_quote || (node.attributes && node.attributes.best_quote);
                    const hasVector = hasChunks || hasQuote;
                    
                    // Customize node appearance based on having vectors/quotes
                    const nodeSize = normalizeTypeKey(node.type) === 'TEXT_CHUNK' ? 12 : (hasVector ? 25 : 20);
                    
                    return {
                        id: node.id,
                        label: node.label || node.name || node.id,
                        title: `Type: ${node.type}<br>ID: ${node.id}${hasVector ? '<br>📄 Has vectors' : ''}`,
                        shape: entityShapes[normalizeTypeKey(node.type)] || entityShapes.DEFAULT,
                        color: entityColors[normalizeTypeKey(node.type)] || entityColors.DEFAULT,
                        size: nodeSize,
                        borderWidth: hasVector ? 3 : 1,
                        borderColor: hasVector ? '#2ecc71' : undefined,
                        originalData: node
                    };
                });

                // Combine all nodes
                const nodes = [...entityNodes];

                // Process entity relationships
                const entityEdges = rawData.links.map((link, index) => ({
                    id: `edge_${index}`,
                    from: link.source,
                    to: link.target,
                    label: link.label || '',
                    title: `Type: ${link.label}<br>Conditions: ${link.conditions || 'N/A'}`,
                    arrows: 'to',
                    font: { align: 'top' },
                    color: (link.label === 'MENTIONS') ? '#7f8c8d' : '#848484',
                    dashes: (link.label === 'MENTIONS'),
                    width: (link.label === 'MENTIONS') ? 1 : 1,
                    originalData: link
                }));

                // Combine all edges
                const edges = [...entityEdges];

                graphData = { nodes, edges }; // Store processed data

                const options = {
                    nodes: {
                        font: { size: 12, color: '#333' },
                        borderWidth: 1,
                         shapeProperties: {
                             useBorderWithImage: true
                         }
                    },
                    edges: {
                        width: 1,
                        color: '#848484',
                        smooth: {
                            type: 'continuous' // Makes edges curvier
                        },
                        font: {
                             size: 10,
                             color: '#555',
                             strokeWidth: 0 // No background for edge label
                         }
                    },
                    physics: {
                        enabled: true,
                        solver: 'forceAtlas2Based', // Good general-purpose layout
                         forceAtlas2Based: {
                             gravitationalConstant: -50,
                             centralGravity: 0.01,
                             springLength: 100,
                             springConstant: 0.08,
                             avoidOverlap: 0.5 // Increase to reduce overlap
                         },
                         stabilization: { iterations: 150 } // More iterations for stability
                    },
                    interaction: {
                         hover: true, // Show tooltips on hover
                         tooltipDelay: 200,
                         multiselect: true,
                         selectConnectedEdges: false,
                         keyboard: { enabled: true, bindToWindow: true }
                     },
                     layout: {
                         // randomSeed: 2 // Uncomment for reproducible layout (useful for debugging)
                     }
                };

                // Use DataSets so we can mutate graph after deletions
                nodesDs = new vis.DataSet(nodes);
                edgesDs = new vis.DataSet(edges);
                network = new vis.Network(graphContainer, { nodes: nodesDs, edges: edgesDs }, options);
                
                // Update loaded count after initial load
                loadedNodeCount = nodes.length;
                updatePaginationInfo();

                 // --- Event Listeners ---
                 network.on("click", function (params) { handleSelection(params); });
                 network.on("select", function () { handleSelection({ nodes: network.getSelectedNodes(), edges: network.getSelectedEdges() }); });
                 network.on("deselectNode", function () { handleSelection({ nodes: network.getSelectedNodes(), edges: network.getSelectedEdges() }); });
                 network.on("deselectEdge", function () { handleSelection({ nodes: network.getSelectedNodes(), edges: network.getSelectedEdges() }); });

                 network.on("stabilizationIterationsDone", function () {
                     console.log("Layout stabilization complete.");
                     network.stopSimulation(); // Optional: stop physics after stabilization
                     // network.fit(); // Fit graph to view
                 });

                console.log("Graph initialized.");

            } catch (error) {
                console.error("Error initializing graph:", error);
                try { console.error("Graph data raw error:", error?.stack || error); } catch(e) {}
                graphContainer.innerHTML = `<p style="color:red; padding: 20px;">Failed to load graph data: ${error.message}</p>`;
            }
        }

        async function loadMore() {
            try {
                if (nextCursor == null) return;
                const params = new URLSearchParams();
                params.set('limit', '10000'); // Increased from 100 to allow loading larger graphs
                params.set('cursor', String(nextCursor));
                if (activeFilters.q) params.set('q', activeFilters.q);
                if (activeFilters.types) params.set('types', activeFilters.types);
                if (activeFilters.jurisdiction) params.set('jurisdiction', activeFilters.jurisdiction);
                const resp = await fetch(`/api/kg/graph-data?${params.toString()}`);
                const page = await resp.json();
                if (!resp.ok) throw new Error(page && page.detail ? page.detail : 'Load more failed');
                nextCursor = page.next_cursor ?? null;
                // Update total count if provided (may be null on subsequent loads)
                if (page.total_count !== null && page.total_count !== undefined) {
                    totalNodeCount = page.total_count;
                }
                // Update loaded count (add new nodes to existing count)
                const newNodesCount = page.loaded_count ?? page.nodes?.length ?? 0;
                loadedNodeCount += newNodesCount;
                updatePaginationInfo();

                const newNodes = page.nodes.map(node => {
                    // Check if node has chunks/quotes (look in both node and attributes)
                    const hasChunks = (node.chunk_ids && node.chunk_ids.length > 0) || 
                                     (node.attributes && node.attributes.chunk_ids && node.attributes.chunk_ids.length > 0);
                    const hasQuote = node.best_quote || (node.attributes && node.attributes.best_quote);
                    const hasVector = hasChunks || hasQuote;
                    
                    // Customize node appearance based on having vectors/quotes
                    const nodeSize = normalizeTypeKey(node.type) === 'TEXT_CHUNK' ? 12 : (hasVector ? 25 : 20);
                    
                    return {
                        id: node.id,
                        label: node.label || node.name || node.id,
                        title: `Type: ${node.type}<br>ID: ${node.id}${hasVector ? '<br>📄 Has vectors' : ''}`,
                        shape: entityShapes[normalizeTypeKey(node.type)] || entityShapes.DEFAULT,
                        color: entityColors[normalizeTypeKey(node.type)] || entityColors.DEFAULT,
                        size: nodeSize,
                        borderWidth: hasVector ? 3 : 1,
                        borderColor: hasVector ? '#2ecc71' : undefined,
                        originalData: node
                    };
                });
                const newEdges = page.links.map((link, index) => ({
                    id: `edge_more_${Date.now()}_${index}`,
                    from: link.source,
                    to: link.target,
                    label: link.label || '',
                    title: `Type: ${link.label}<br>Conditions: ${link.conditions || 'N/A'}`,
                    arrows: 'to',
                    font: { align: 'top' },
                    color: (link.label === 'MENTIONS') ? '#7f8c8d' : '#848484',
                    dashes: (link.label === 'MENTIONS'),
                    width: (link.label === 'MENTIONS') ? 1 : 1,
                    originalData: link
                }));

                // Insert into datasets while avoiding duplicate nodes
                const existingIds = new Set(nodesDs.getIds());
                const nodesToAdd = newNodes.filter(n => !existingIds.has(n.id));
                if (nodesToAdd.length) nodesDs.add(nodesToAdd);
                if (newEdges.length) edgesDs.add(newEdges);
                
                // Correct loaded count after deduplication
                loadedNodeCount = nodesDs.length;
                updatePaginationInfo();
            } catch (err) {
                console.error('Load more error:', err);
                alert(`Error: ${err.message || err}`);
            }
        }

        // Update pagination info display
        function updatePaginationInfo() {
            const paginationText = document.getElementById('pagination-text');
            if (!paginationText) return;
            
            const currentCount = nodesDs ? nodesDs.length : loadedNodeCount;
            if (totalNodeCount !== null && totalNodeCount !== undefined) {
                const percentage = totalNodeCount > 0 ? Math.round((currentCount / totalNodeCount) * 100) : 0;
                paginationText.textContent = `Showing ${currentCount.toLocaleString()} of ${totalNodeCount.toLocaleString()} nodes (${percentage}%)`;
                if (nextCursor !== null) {
                    paginationText.textContent += ' • More available';
                } else if (currentCount >= totalNodeCount) {
                    paginationText.textContent += ' • All nodes loaded';
                }
            } else {
                paginationText.textContent = `Loaded ${currentCount.toLocaleString()} nodes`;
                if (nextCursor !== null) {
                    paginationText.textContent += ' • More available';
                }
            }
        }

        // --- Selection Handling ---
        function handleSelection(params) {
            selectedNodeId = null; // primary selected
            selectedEdgeId = null;
            selectedNodeIds = new Set(params.nodes || []);

            if (params.nodes && params.nodes.length > 0) {
                selectedNodeId = params.nodes[params.nodes.length - 1];
                const node = nodesDs ? nodesDs.get(selectedNodeId) : null;
                if (params.nodes.length === 1) {
                    displayNodeDetails(node);
                } else {
                    displayMultiSelectionDetails(params.nodes.length);
                }
            } else if (params.edges && params.edges.length > 0) {
                 selectedEdgeId = params.edges[0];
                 const edge = edgesDs ? edgesDs.get(selectedEdgeId) : null;
                 displayEdgeDetails(edge);
            } else {
                displayDefaultDetails();
            }
            updateActionButtons();
        }

        async function displayNodeDetails(node) {
            if (!node || !node.originalData) {
                displayDefaultDetails();
                return;
            }
            const data = node.originalData;
            
            // Regular entity display
            let detailsHtml = `<h3>Entity Details: ${escapeHtml(data.label || data.id)}</h3>`;
            detailsHtml += `<p><strong>ID:</strong> <code>${escapeHtml(data.id)}</code></p>`;
            detailsHtml += `<p><strong>Type:</strong> ${escapeHtml(data.type)}</p>`;
            if (normalizeTypeKey(data.type) === 'TEXT_CHUNK') {
                const src = (data.source_metadata && data.source_metadata.source) ? String(data.source_metadata.source) : '';
                const link = (src.startsWith('http://') || src.startsWith('https://')) ? `<a href="${escapeHtml(src)}" target="_blank">${escapeHtml(src)}</a>` : escapeHtml(src);
                const text = (data.attributes && data.attributes.text) ? String(data.attributes.text) : '';
                const snippet = text.length > 800 ? (text.slice(0, 800) + '…') : text;
                detailsHtml += `<p><strong>Source:</strong> ${link}</p>`;
                detailsHtml += `<p><strong>Chunk Index:</strong> ${escapeHtml(String(data.attributes && data.attributes.chunk_index || '0'))}</p>`;
                detailsHtml += `<div style="margin-top:8px; padding:8px; background:#fff; border:1px solid #ddd; border-radius:6px; max-height:220px; overflow:auto;"><strong>Text:</strong><br><span style="white-space:pre-wrap;">${escapeHtml(snippet)}</span></div>`;
                detailsPanel.innerHTML = detailsHtml;
                return;
            }
            if (data.description) {
                detailsHtml += `<p><strong>Description:</strong> ${escapeHtml(data.description)}</p>`;
            }
            if (data.jurisdiction) {
                 detailsHtml += `<p><strong>Jurisdiction:</strong> <code>${escapeHtml(data.jurisdiction)}</code></p>`;
            }
            // Show multiple sources if available (source_ids)
            if (data.source_ids && Array.isArray(data.source_ids) && data.source_ids.length > 0) {
                detailsHtml += `<p><strong>Sources (${data.source_ids.length}):</strong></p><ul>`;
                data.source_ids.slice(0, 5).forEach((sourceId, idx) => {
                    detailsHtml += `<li><code>${escapeHtml(String(sourceId))}</code></li>`;
                });
                if (data.source_ids.length > 5) {
                    detailsHtml += `<li>… and ${data.source_ids.length - 5} more</li>`;
                }
                detailsHtml += `</ul>`;
            }
            
            if (data.source_metadata) {
                const sm = data.source_metadata;
                const srcType = sm.source_type || 'N/A';
                const src = sm.source || '';
                const sourceText = (typeof src === 'string' && (src.startsWith('http://') || src.startsWith('https://')))
                    ? `<a href="${escapeHtml(src)}" target="_blank">${escapeHtml(src)}</a>`
                    : escapeHtml(String(src || ''));
                detailsHtml += `<p><strong>Primary Source (${escapeHtml(String(srcType))}):</strong> ${sourceText}</p>`;
                if (sm.title) detailsHtml += `<p><strong>Title:</strong> ${escapeHtml(String(sm.title))}</p>`;
                if (sm.organization) detailsHtml += `<p><strong>Organization:</strong> ${escapeHtml(String(sm.organization))}</p>`;
                if (sm.created_at) detailsHtml += `<p><strong>Created:</strong> ${escapeHtml(String(sm.created_at))}</p>`;
            }
            if (typeof data.mentions_count === 'number') {
                detailsHtml += `<p><strong>Mentions:</strong> ${data.mentions_count}</p>`;
            }
            if (Array.isArray(data.provenance) && data.provenance.length > 0) {
                detailsHtml += `<p><strong>Provenance:</strong></p><ul>`;
                (data.provenance.slice(0, 5)).forEach((p, i) => {
                    const src = p && p.source ? p.source.source : '';
                    const link = (typeof src === 'string' && (src.startsWith('http://') || src.startsWith('https://')))
                        ? `<a href="${escapeHtml(src)}" target="_blank">${escapeHtml(src)}</a>`
                        : escapeHtml(String(src || ''));
                    const quote = p && p.quote ? escapeHtml(p.quote) : '';
                    detailsHtml += `<li>${link}${quote ? `<div style="margin-top:4px;font-size:0.9em;color:#444;">"${quote}"</div>` : ''}</li>`;
                });
                if (data.provenance.length > 5) {
                    detailsHtml += `<li>… and ${data.provenance.length - 5} more</li>`;
                }
                detailsHtml += `</ul>`;
            }
            if (data.attributes && Object.keys(data.attributes).length > 0) {
                 detailsHtml += `<p><strong>Attributes:</strong></p><ul>`;
                 for (const [key, value] of Object.entries(data.attributes)) {
                     detailsHtml += `<li><code>${escapeHtml(key)}</code>: ${escapeHtml(JSON.stringify(value))}</li>`;
                 }
                 detailsHtml += `</ul>`;
            }
            
            // Show entity details immediately, then load chunks/quotes
            detailsPanel.innerHTML = detailsHtml + '<div id="async-details"><p style="color:#7f8c8d; font-size:0.85em;">Loading chunks & quotes...</p></div>';

            // Fetch chunks and quotes in parallel, then update once
            const entityId = data.id;
            const [chunksHtml, quotesHtml] = await Promise.all([
                buildEntityChunksHtml(entityId),
                buildEntityQuoteHtml(entityId)
            ]);

            // Only update if we're still showing the same entity
            const asyncDiv = detailsPanel.querySelector('#async-details');
            if (asyncDiv) {
                if (chunksHtml || quotesHtml) {
                    asyncDiv.innerHTML = (chunksHtml || '') + (quotesHtml || '');
                } else {
                    asyncDiv.remove();
                }
            }
        }
        
        async function buildEntityChunksHtml(entityId) {
            try {
                const response = await fetch(`/api/entities/${encodeURIComponent(entityId)}/chunks`);
                if (!response.ok) return '';
                const data = await response.json();

                if (!data.chunks || data.chunks.length === 0) return '';

                let html = `<div class="entity-chunks-section">`;
                html += `<p><strong>Vectors/Chunks (${data.chunk_count}):</strong></p>`;
                html += `<div style="max-height:200px; overflow-y:auto; padding:8px; background:#fff; border:1px solid #ddd; border-radius:6px; margin:8px 0;">`;

                data.chunks.slice(0, 5).forEach(chunk => {
                    const chunkId = escapeHtml(chunk.chunk_id || 'N/A');
                    html += `<div style="border-bottom:1px solid #eee; padding:6px 0; margin-bottom:6px;">`;
                    html += `<a href="#" onclick="viewChunkDetails('${chunkId}'); return false;" style="color:#3498db; text-decoration:none; font-weight:600;">${chunkId}</a>`;
                    if (chunk.doc_title) {
                        html += `<br><span style="font-size:0.85em; color:#888;">${escapeHtml(chunk.doc_title)}</span>`;
                    }
                    if (chunk.text_preview) {
                        html += `<p style="font-size:0.85em; color:#444; margin:4px 0; font-style:italic;">${escapeHtml(chunk.text_preview)}</p>`;
                    }
                    html += `</div>`;
                });

                if (data.chunks.length > 5) {
                    html += `<p style="font-size:0.85em; color:#666;">... and ${data.chunks.length - 5} more chunks</p>`;
                }
                html += `</div></div>`;
                return html;
            } catch (error) {
                console.error(`Error loading chunks for ${entityId}:`, error);
                return '';
            }
        }

                if (!response.ok) return '';

                if (!data.best_quote || !data.best_quote.text) return '';

                let html = `<div class="entity-quote-section">`;
                html += `<p><strong>Best Quote:</strong></p>`;
                html += `<div style="padding:10px; background:#fff3cd; border-left:3px solid #ffc107; margin:8px 0; border-radius:4px;">`;
                html += `<p style="font-style:italic; margin:0; color:#856404;">"${escapeHtml(data.best_quote.text)}"</p>`;
                if (data.best_quote.explanation) {
                    html += `<p style="font-size:0.85em; color:#856404; margin:4px 0 0 0;">${escapeHtml(data.best_quote.explanation)}</p>`;

                if (data.best_quote.source_id) {

                }
                if (data.best_quote.chunk_id) {
                    html += `<p style="font-size:0.85em; color:#856404; margin:4px 0 0 0;"><strong>Chunk:</strong> <a href="#" onclick="viewChunkDetails('${escapeHtml(String(data.best_quote.chunk_id))}'); return false;" style="color:#3498db;">${escapeHtml(String(data.best_quote.chunk_id))}</a></p>`;
                }
                html += `</div>`;

                if (data.all_quotes && Array.isArray(data.all_quotes) && data.all_quotes.length > 1) {

                    html += `<div style="max-height:200px; overflow-y:auto; padding:8px; background:#fff; border:1px solid #ddd; border-radius:6px; margin:8px 0;">`;

                            html += `<p style="font-style:italic; font-size:0.9em; color:#444; margin:0;">"${escapeHtml(quote.text)}"</p>`;

                                html += `<p style="font-size:0.8em; color:#666; margin:4px 0 0 0;">Source: <code>${escapeHtml(String(quote.source_id))}</code></p>`;

        function displayEdgeDetails(edge) {
            if (!edge || !edge.originalData) {
                displayDefaultDetails();
                return;
            }
            const data = edge.originalData;
            let detailsHtml = `<h3>Relationship Details</h3>`;
            detailsHtml += `<p><strong>Type:</strong> ${escapeHtml(data.label || 'N/A')}</p>`;
            if (data.source && data.target) {
                detailsHtml += `<p><strong>From:</strong> <code>${escapeHtml(String(data.source))}</code></p>`;
                detailsHtml += `<p><strong>To:</strong> <code>${escapeHtml(String(data.target))}</code></p>`;
            }
            if (data.conditions) {
                detailsHtml += `<p><strong>Conditions:</strong> ${escapeHtml(String(data.conditions))}</p>`;
            }
            // Show relationship strength if available
            if (data.strength || (data.attributes && data.attributes.strength_score)) {
                const strength = data.strength || data.attributes?.strength_score;
                const strengthNum = typeof strength === 'string' ? parseFloat(strength) : (strength || 0);
                const strengthPercent = Math.round(strengthNum * 100);
                let strengthColor = '#e74c3c'; // red
                if (strengthNum >= 0.7) strengthColor = '#2ecc71'; // green
                else if (strengthNum >= 0.4) strengthColor = '#f39c12'; // orange
                detailsHtml += `<p><strong>Strength:</strong> <span style="color:${strengthColor}; font-weight:bold;">${strengthPercent}%</span></p>`;
            }
            if (data.attributes && Object.keys(data.attributes).length > 0) {
                detailsHtml += `<p><strong>Attributes:</strong></p><ul>`;
                for (const [key, value] of Object.entries(data.attributes)) {
                    detailsHtml += `<li><code>${escapeHtml(key)}</code>: ${escapeHtml(JSON.stringify(value))}</li>`;
                }
                detailsHtml += `</ul>`;
            }
            detailsPanel.innerHTML = detailsHtml;
        }

        function displayMultiSelectionDetails(count) {
            detailsPanel.innerHTML = `<h3>Multiple Selection</h3><p>${count} nodes selected.</p>`;
        }

        function displayDefaultDetails() {
            detailsPanel.innerHTML = '<h3>Selection Details</h3><p>Click on a node or edge to see details here.</p>';
        }
        
        // Function to view chunk details with enhanced entity navigation
        async function viewChunkDetails(chunkId, contextSize = 0) {
            try {
                // Fetch chunk details, entities, and context in parallel
                const [adjacentRes, entitiesRes, contextRes] = await Promise.all([
                    fetch(`/api/chunks/adjacent?chunk_id=${encodeURIComponent(chunkId)}`),
                    fetch(`/api/chunks/${encodeURIComponent(chunkId)}/entities`),
                    contextSize > 0 ? fetch(`/api/chunks/${encodeURIComponent(chunkId)}/context?context_size=${contextSize}`) : Promise.resolve(null)
                ]);

                if (!adjacentRes.ok) {
                    alert(`Failed to load chunk details: ${adjacentRes.statusText}`);
                    return;
                }

                const adjacentData = await adjacentRes.json();
                const entitiesData = entitiesRes.ok ? await entitiesRes.json() : null;
                const contextData = contextRes && contextRes.ok ? await contextRes.json() : null;

                // Get current chunk from adjacent data
                const currentChunk = adjacentData.chunk || {
                    chunk_id: chunkId,
                    text: adjacentData.current?.text || '',
                    chunk_index: adjacentData.current?.chunk_index || 0
                };

                let chunkHtml = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3>Chunk Details: ${escapeHtml(chunkId)}</h3>
                    <div>
                        <button onclick="viewChunkDetails('${escapeHtml(chunkId)}', 0)" style="padding:4px 8px; margin:0 2px; font-size:0.85em;">No Context</button>
                        <button onclick="viewChunkDetails('${escapeHtml(chunkId)}', 2)" style="padding:4px 8px; margin:0 2px; font-size:0.85em;">±2 Chunks</button>
                        <button onclick="viewChunkDetails('${escapeHtml(chunkId)}', 5)" style="padding:4px 8px; margin:0 2px; font-size:0.85em;">±5 Chunks</button>
                    </div>
                </div>`;

                // Chunk metadata
                chunkHtml += `<p><strong>Chunk ID:</strong> <code>${escapeHtml(currentChunk.chunk_id || chunkId)}</code></p>`;
                if (currentChunk.chunk_index !== undefined) {
                    chunkHtml += `<p><strong>Chunk Index:</strong> ${currentChunk.chunk_index}</p>`;
                }
                
                // Source document link for chunk
                if (entitiesData && entitiesData.source_metadata) {
                    const sm = entitiesData.source_metadata;
                    const src = sm.source || '';
                    const isUrl = typeof src === 'string' && (src.startsWith('http://') || src.startsWith('https://'));
                    
                    chunkHtml += `<div style="margin-top:10px; padding:10px; background:#f8f9fa; border:1px solid #dee2e6; border-radius:6px;">
                        <strong>📄 Source Document</strong>`;
                    
                    if (sm.title) {
                        chunkHtml += `<p style="margin:4px 0; font-weight:600;">${escapeHtml(sm.title)}</p>`;
                    }
                    
                    if (isUrl) {
                        chunkHtml += `<p style="margin:4px 0;"><a href="${escapeHtml(src)}" target="_blank" rel="noopener noreferrer" 
                            style="color:#3498db; text-decoration:none; word-break:break-all;">${escapeHtml(src)}</a> 
                            <span style="color:#6c757d; font-size:0.85em;">(opens in new tab)</span></p>`;
                    } else if (src) {
                        chunkHtml += `<p style="margin:4px 0;"><code>${escapeHtml(src)}</code></p>`;
                    }
                    
                    if (sm.organization || sm.jurisdiction || sm.authority) {
                        chunkHtml += `<div style="margin-top:6px; font-size:0.9em; color:#495057;">`;
                        if (sm.organization) chunkHtml += `<div><strong>Organization:</strong> ${escapeHtml(sm.organization)}</div>`;
                        if (sm.jurisdiction) chunkHtml += `<div><strong>Jurisdiction:</strong> ${escapeHtml(sm.jurisdiction)}</div>`;
                        if (sm.authority) {
                            const authorityLevel = sm.authority === 'BINDING_LEGAL_AUTHORITY' ? '🔴 Binding' : 
                                                 sm.authority === 'PERSUASIVE_AUTHORITY' ? '🟡 Persuasive' : 
                                                 sm.authority === 'INFORMATIONAL_ONLY' ? '🟢 Informational' : escapeHtml(String(sm.authority));
                            chunkHtml += `<div><strong>Authority:</strong> ${authorityLevel}</div>`;
                        }
                        chunkHtml += `</div>`;
                    }
                    
                    chunkHtml += `</div>`;
                } else if (entitiesData && entitiesData.source_id) {
                    chunkHtml += `<p><strong>Source ID:</strong> <code>${escapeHtml(String(entitiesData.source_id))}</code></p>`;
                }

                // Context display (preceding chunks)
                if (contextData && contextData.preceding && contextData.preceding.length > 0) {
                    chunkHtml += `<div style="margin:10px 0; padding:8px; background:#f0f0f0; border-left:3px solid #3498db; border-radius:4px;">
                        <strong>Preceding Context (${contextData.preceding.length} chunks):</strong>`;
                    contextData.preceding.forEach(ch => {
                        chunkHtml += `<div style="margin:4px 0; padding:4px; background:#fff; border-radius:3px; font-size:0.9em;">
                            <a href="#" onclick="viewChunkDetails('${escapeHtml(ch.chunk_id)}', ${contextSize}); return false;" style="color:#3498db; font-weight:600;">Chunk ${ch.chunk_index}</a>
                            <p style="margin:4px 0; color:#666;">${escapeHtml(ch.text)}</p>
                        </div>`;
                    });
                    chunkHtml += `</div>`;
                }

                // Current chunk text with entity highlighting
                if (currentChunk.text) {
                    let highlightedText = escapeHtml(currentChunk.text);
                    
                    // Highlight entity mentions if entities are available
                    if (entitiesData && entitiesData.entities && entitiesData.entities.length > 0) {
                        entitiesData.entities.forEach(entity => {
                            const entityName = escapeHtml(entity.name);
                            // Simple word boundary replacement for highlighting
                            const regex = new RegExp(`\\b${entityName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'gi');
                            highlightedText = highlightedText.replace(regex, `<mark style="background-color:#fff3cd; padding:2px 4px; border-radius:3px; cursor:pointer;" onclick="selectNode('${escapeHtml(entity.id)}')" title="${escapeHtml(entity.type)}">${entityName}</mark>`);
                        });
                    }

                    chunkHtml += `<div style="margin-top:8px; padding:12px; background:#fff; border:1px solid #ddd; border-radius:6px; max-height:400px; overflow:auto;">
                        <strong>Text:</strong><br>
                        <span style="white-space:pre-wrap; line-height:1.6;">${highlightedText}</span>
                    </div>`;
                }

                // Context display (following chunks)
                if (contextData && contextData.following && contextData.following.length > 0) {
                    chunkHtml += `<div style="margin:10px 0; padding:8px; background:#f0f0f0; border-left:3px solid #2ecc71; border-radius:4px;">
                        <strong>Following Context (${contextData.following.length} chunks):</strong>`;
                    contextData.following.forEach(ch => {
                        chunkHtml += `<div style="margin:4px 0; padding:4px; background:#fff; border-radius:3px; font-size:0.9em;">
                            <a href="#" onclick="viewChunkDetails('${escapeHtml(ch.chunk_id)}', ${contextSize}); return false;" style="color:#3498db; font-weight:600;">Chunk ${ch.chunk_index}</a>
                            <p style="margin:4px 0; color:#666;">${escapeHtml(ch.text)}</p>
                        </div>`;
                    });
                    chunkHtml += `</div>`;
                }

                // Entities in chunk (clickable)
                if (entitiesData && entitiesData.entities && entitiesData.entities.length > 0) {
                    chunkHtml += `<div style="margin-top:15px; padding:10px; background:#e8f4f8; border-radius:6px;">
                        <strong>📌 Entities in this chunk (${entitiesData.entities.length}):</strong>
                        <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">`;
                    entitiesData.entities.forEach(entity => {
                        chunkHtml += `<a href="#" onclick="selectNode('${escapeHtml(entity.id)}'); return false;" 
                            style="display:inline-block; padding:6px 12px; background:#fff; border:1px solid #3498db; border-radius:4px; 
                            color:#3498db; text-decoration:none; font-size:0.9em; cursor:pointer; margin:2px;"
                            title="${escapeHtml(entity.type)}: ${escapeHtml(entity.description || '')}">
                            ${escapeHtml(entity.name)}
                        </a>`;
                    });
                    chunkHtml += `</div></div>`;
                } else if (currentChunk.entities && Array.isArray(currentChunk.entities) && currentChunk.entities.length > 0) {
                    // Fallback to basic entity list
                    chunkHtml += `<p><strong>Entities in this chunk (${currentChunk.entities.length}):</strong></p><ul>`;
                    currentChunk.entities.slice(0, 10).forEach(entityId => {
                        chunkHtml += `<li><a href="#" onclick="selectNode('${escapeHtml(String(entityId))}'); return false;" style="color:#3498db;">${escapeHtml(String(entityId))}</a></li>`;
                    });
                    if (currentChunk.entities.length > 10) {
                        chunkHtml += `<li>… and ${currentChunk.entities.length - 10} more</li>`;
                    }
                    chunkHtml += `</ul>`;
                }

                // Navigation to adjacent chunks
                if (adjacentData.prev || adjacentData.next) {
                    chunkHtml += `<div style="margin-top:15px; padding:10px; background:#f8f9fa; border-radius:6px; display:flex; justify-content:space-between;">
                        ${adjacentData.prev ? `<button onclick="viewChunkDetails('${escapeHtml(adjacentData.prev.id)}', ${contextSize})" style="padding:6px 12px; background:#3498db; color:white; border:none; border-radius:4px; cursor:pointer;">← Previous (${adjacentData.prev.chunk_index})</button>` : '<span></span>'}
                        ${adjacentData.next ? `<button onclick="viewChunkDetails('${escapeHtml(adjacentData.next.id)}', ${contextSize})" style="padding:6px 12px; background:#3498db; color:white; border:none; border-radius:4px; cursor:pointer;">Next (${adjacentData.next.chunk_index}) →</button>` : '<span></span>'}
                    </div>`;
                }
                
                detailsPanel.innerHTML = chunkHtml;
            } catch (error) {
                console.error('Error loading chunk details:', error);
                alert(`Error loading chunk details: ${error.message}`);
            }
        }

        // --- Actions ---
        function updateActionButtons() {
            const count = selectedNodeIds.size;
            deleteSelectedBtn.disabled = count === 0;
            expandBtn.disabled = count === 0;
            consolidateBtn.disabled = count < 2;
        }

        // Select a node by ID and show its details (used by chunk entity links)
        function selectNode(nodeId) {
            const node = nodesDs ? nodesDs.get(nodeId) : null;
            if (node && network) {
                network.selectNodes([nodeId]);
                selectedNodeId = nodeId;
                selectedNodeIds = new Set([nodeId]);
                displayNodeDetails(node);
                network.focus(nodeId, { scale: 1.2, animation: { duration: 300 } });
                updateActionButtons();
            } else {
                alert('Node not found in current view. Try loading more nodes.');
            }
        }

        deleteSelectedBtn.addEventListener('click', async () => {
            const ids = Array.from(selectedNodeIds);
            if (ids.length === 0) return;
            await deleteNodes(ids);
        });

        expandBtn.addEventListener('click', async () => {
            const ids = Array.from(selectedNodeIds);
            if (ids.length === 0) return;
            await expandNeighbors(ids);
        });

        consolidateBtn.addEventListener('click', async () => {
            const ids = Array.from(selectedNodeIds);
            if (ids.length < 2) return;
            await consolidateNodes(ids);
        });

        consolidateAllBtn.addEventListener('click', async () => {
            try {
                if (!confirm('Consolidate the entire graph (strict match)? This may merge close duplicates.')) return;
                const resp = await fetch('/api/kg/consolidate-all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ threshold: 0.97 })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data && data.detail ? data.detail : 'Consolidate-all failed');
                alert('Consolidate-all completed');
                initializeGraph();
            } catch (err) {
                console.error('Consolidate-all error:', err);
                alert(`Error: ${err.message || err}`);
            }
        });

        // Filters & Load More
        document.getElementById('apply-filters-btn').addEventListener('click', async () => {
            activeFilters.q = (document.getElementById('filter-q').value || '').trim() || null;
            activeFilters.types = (document.getElementById('filter-types').value || '').trim() || null;
            activeFilters.jurisdiction = (document.getElementById('filter-jurisdiction').value || '').trim() || null;
            await initializeGraph();
        });
        document.getElementById('load-more-btn').addEventListener('click', loadMore);

        async function deleteNodes(nodeIds) {
            try {
                // Filter out concept group nodes (front-end only constructs)
                const entityIds = nodeIds.filter(id => {
                    const n = nodesDs.get(id);
                    return n && !(n.originalData && n.originalData.isConceptGroup);
                });

                if (entityIds.length === 0) {
                    alert('No deletable entities selected. Concept groups cannot be deleted.');
                    return;
                }

                const confirmMsg = entityIds.length === 1 ?
                    `Delete node "${entityIds[0]}" and its relationships?` :
                    `Delete ${entityIds.length} nodes and their relationships?`;
                if (!confirm(confirmMsg)) return;

                let response;
                if (entityIds.length === 1) {
                    response = await fetch(`/api/kg/entities/${encodeURIComponent(entityIds[0])}`, { method: 'DELETE' });
                } else {
                    response = await fetch('/api/kg/entities/delete-bulk', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ids: entityIds })
                    });
                }
                const result = await response.json();
                if (!response.ok) {
                    const msg = result && result.detail ? result.detail : 'Delete failed';
                    throw new Error(msg);
                }

                // Remove nodes and incident edges from the visualization
                const toRemove = new Set(entityIds);
                // Remove edges first
                const incidentEdges = edgesDs.get({ filter: e => toRemove.has(e.from) || toRemove.has(e.to) }).map(e => e.id);
                if (incidentEdges.length) edgesDs.remove(incidentEdges);
                // Remove nodes
                nodesDs.remove(entityIds);

                // Clear selection and details
                selectedNodeIds.clear();
                selectedNodeId = null;
                selectedEdgeId = null;
                network.unselectAll();
                displayDefaultDetails();
                updateActionButtons();
            } catch (err) {
                console.error('Delete error:', err);
                alert(`Error: ${err.message || err}`);
            }
        }

        async function expandNeighbors(nodeIds) {
            try {
                const resp = await fetch('/api/kg/expand', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ node_ids: nodeIds })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data && data.detail ? data.detail : 'Expand failed');
                alert(`Expanded: ${data.expanded || 0} (examined ${data.examined || 0})`);
                // Reload the graph to reflect expanded nodes/edges
                initializeGraph();
            } catch (err) {
                console.error('Expand error:', err);
                alert(`Error: ${err.message || err}`);
            }
        }

        async function consolidateNodes(nodeIds) {
            try {
                const resp = await fetch('/api/kg/consolidate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ node_ids: nodeIds, threshold: 0.95 })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data && data.detail ? data.detail : 'Consolidate failed');
                alert(`Consolidated: ${data.merged || 0} (examined ${data.examined || 0})`);
                // Reload the graph to reflect merged nodes/edges
                initializeGraph();
            } catch (err) {
                console.error('Consolidate error:', err);
                alert(`Error: ${err.message || err}`);
            }
        }

        // --- Chat Functionality (Placeholder) ---
        sendBtn.addEventListener('click', handleChatSend);
        chatInput.addEventListener('keypress', function (e) {
             if (e.key === 'Enter') {
                 handleChatSend();
             }
        });

        async function handleChatSend() {
            const message = chatInput.value.trim();
            if (!message) return;

            appendChatMessage(message, 'user');
            chatInput.value = ''; // Clear input

            appendChatMessage('Thinking...', 'bot', true); // Indicate bot is processing

            try {
                // --- Make the actual API call --- 
                console.log(`Sending message: ${message}, Context ID: ${selectedNodeId || selectedEdgeId}`);
                const apiResponse = await fetch('/api/kg/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        message: message, 
                        context_id: selectedNodeId || null
                    })
                });
                let result = {};
                try { result = await apiResponse.json(); } catch (e) { result = {}; }
                if (!apiResponse.ok) { 
                    const errorDetail = result.detail || `Chat API Error: ${apiResponse.status}`;
                    throw new Error(errorDetail);
                }
                const botResponse = result.response || "Sorry, I received an empty response.";
                removeLoadingMessage();
                appendChatMessage(botResponse, 'bot');
            } catch (error) {
                console.error("Chat API error:", error);
                removeLoadingMessage();
                appendChatMessage(`Error: ${error.message}`, 'bot', false, true);
            }
        }

        function appendChatMessage(text, sender, isLoading = false, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('chat-message');
            messageDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
            if (isLoading) messageDiv.classList.add('loading-message');
            if (isError) messageDiv.style.backgroundColor = '#fdedec';
            messageDiv.textContent = text;
            chatLog.appendChild(messageDiv);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function removeLoadingMessage() {
            const loadingMsg = chatLog.querySelector('.loading-message');
            if (loadingMsg) {
                loadingMsg.remove();
            }
        }

        // --- Utility: HTML Escaping ---
        function escapeHtml(unsafe) {
            if (typeof unsafe !== 'string') return unsafe;
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // --- Initial Load ---
        document.addEventListener('DOMContentLoaded', initializeGraph);

    </script>
</body>
</html>
