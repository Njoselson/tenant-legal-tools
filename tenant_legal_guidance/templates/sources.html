<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sources</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
            background-color: #f8f9fa;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
            text-align: center;
        }
        nav {
            margin-bottom: 20px;
            text-align: center;
            background: #34495e;
            padding: 10px;
            border-radius: 5px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover { text-decoration: underline; }

        /* Summary bar */
        .summary-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 16px;
            padding: 12px 18px;
            background: #fff;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        .summary-bar .stat { font-weight: 600; color: #2c3e50; }
        .summary-bar .stat-green { color: #2ecc71; }
        .summary-bar .stat-gray { color: #95a5a6; }

        .manifest-card {
            background: #fff;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .manifest-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            background: #fafbfc;
            border-bottom: 1px solid #ecf0f1;
        }
        .manifest-header:hover { background: #f0f3f5; }
        .manifest-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: #2c3e50;
        }
        .manifest-count {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-left: 8px;
        }
        .manifest-status-summary {
            font-size: 0.8rem;
            color: #95a5a6;
            margin-left: 8px;
        }
        .manifest-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-ingest {
            background: #2ecc71;
            color: white;
        }
        .btn-ingest:hover:not(:disabled) { background: #27ae60; }
        .btn-ingest:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .btn-reingest {
            background: #e67e22;
            color: white;
        }
        .btn-reingest:hover:not(:disabled) { background: #d35400; }
        .btn-reingest:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .btn-sm {
            padding: 3px 10px;
            font-size: 0.75rem;
        }
        .chevron {
            font-size: 0.8rem;
            color: #95a5a6;
            transition: transform 0.2s;
            margin-right: 10px;
        }
        .manifest-card.expanded .chevron { transform: rotate(90deg); }

        .manifest-entries {
            display: none;
            padding: 0;
        }
        .manifest-card.expanded .manifest-entries { display: block; }

        .entry-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .entry-table th {
            text-align: left;
            padding: 8px 14px;
            background: #f7f9fa;
            color: #7f8c8d;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #ecf0f1;
        }
        .entry-table td {
            padding: 7px 14px;
            border-bottom: 1px solid #f4f5f6;
            vertical-align: middle;
        }
        .entry-table tr:last-child td { border-bottom: none; }
        .entry-table tr:hover td { background: #fafbfc; }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .dot-ingested { background: #2ecc71; }
        .dot-pending { background: #bdc3c7; }
        .dot-loading { background: #f39c12; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .entry-link {
            color: #3498db;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .entry-link:hover { text-decoration: underline; }

        .entry-title {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .entry-date {
            font-size: 0.78rem;
            color: #95a5a6;
            white-space: nowrap;
        }

        /* Job progress banner */
        .job-banner {
            display: none;
            background: #eaf5ff;
            border: 1px solid #aed6f1;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 16px;
        }
        .job-banner.visible { display: block; }
        .job-banner.completed {
            background: #e8f8f5;
            border-color: #a9dfbf;
        }
        .job-banner.failed {
            background: #fdedec;
            border-color: #f5b7b1;
        }
        .job-banner-text {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        .progress-bar-container {
            background: #dfe6e9;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar {
            background: #3498db;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .progress-stats {
            font-size: 0.82rem;
            color: #7f8c8d;
            margin-top: 6px;
        }

        .loading-msg {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <h1>Sources</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/kg-view">KG View</a>
        <a href="/sources">Sources</a>
    </nav>

    <div id="summary-bar" class="summary-bar" style="display:none">
        <span>Manifests: <span class="stat" id="sum-manifests">0</span></span>
        <span>Total sources: <span class="stat" id="sum-total">0</span></span>
        <span>Ingested: <span class="stat stat-green" id="sum-ingested">0</span></span>
        <span>Pending: <span class="stat stat-gray" id="sum-pending">0</span></span>
    </div>

    <div id="job-banner" class="job-banner">
        <div class="job-banner-text" id="job-text">Processing...</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="job-progress" style="width: 0%"></div>
        </div>
        <div class="progress-stats" id="job-stats"></div>
    </div>

    <div id="manifests-container">
        <div class="loading-msg">Loading manifests...</div>
    </div>

    <script>
        const statusCache = {};   // filename -> { ingested: {loc: bool}, details: {loc: {fetched_at, ...}} }
        let activeJobs = {};
        let allFiles = [];

        async function loadManifests() {
            try {
                const res = await fetch('/api/v1/curation/manifest-files');
                const data = await res.json();
                allFiles = data.files || [];
                renderManifests(allFiles);
                // Check status for all manifests upfront
                await checkAllStatuses();
            } catch (err) {
                document.getElementById('manifests-container').innerHTML =
                    '<div class="loading-msg" style="color:#e74c3c">Failed to load manifests: ' + err.message + '</div>';
            }
        }

        function renderManifests(files) {
            const container = document.getElementById('manifests-container');
            if (!files.length) {
                container.innerHTML = '<div class="loading-msg">No manifest files found in data/manifests/</div>';
                return;
            }

            // Show summary bar
            const totalEntries = files.reduce((s, f) => s + f.entry_count, 0);
            document.getElementById('sum-manifests').textContent = files.length;
            document.getElementById('sum-total').textContent = totalEntries;
            document.getElementById('summary-bar').style.display = 'flex';

            container.innerHTML = files.map((f, i) => `
                <div class="manifest-card" data-idx="${i}" data-filename="${f.filename}">
                    <div class="manifest-header" onclick="toggleCard(${i})">
                        <div>
                            <span class="chevron">&#9654;</span>
                            <span class="manifest-title">${f.filename.replace('.jsonl', '').replace(/_/g, ' ')}</span>
                            <span class="manifest-count">(${f.entry_count} entries)</span>
                            <span class="manifest-status-summary" id="msummary-${i}"></span>
                        </div>
                        <div class="manifest-actions">
                            <button class="btn btn-reingest btn-sm" onclick="event.stopPropagation(); reingestManifest('${f.filename}', this)" title="Force reingest all entries (even already ingested)">Reingest All</button>
                            <button class="btn btn-ingest" onclick="event.stopPropagation(); ingestManifest('${f.filename}', this)">Ingest New</button>
                        </div>
                    </div>
                    <div class="manifest-entries" id="entries-${i}">
                        ${renderEntries(f.entries, f.filename)}
                    </div>
                </div>
            `).join('');
        }

        function renderEntries(entries, filename) {
            if (!entries.length) return '<div style="padding:14px;color:#95a5a6">No entries</div>';
            return `<table class="entry-table">
                <thead><tr>
                    <th></th>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Ingested</th>
                    <th></th>
                    <th></th>
                </tr></thead>
                <tbody>${entries.map((e, j) => {
                    const dotId = `dot-${filename}-${j}`;
                    const dateId = `date-${filename}-${j}`;
                    const btnId = `rbtn-${filename}-${j}`;
                    return `<tr data-locator="${(e.locator || '').replace(/"/g, '&quot;')}">
                        <td><span class="status-dot dot-loading" id="${dotId}"></span></td>
                        <td class="entry-title" title="${(e.title || e.locator).replace(/"/g, '&quot;')}">${e.title || e.locator}</td>
                        <td>${e.document_type || '-'}</td>
                        <td class="entry-date" id="${dateId}">...</td>
                        <td><button class="btn btn-reingest btn-sm" id="${btnId}" onclick="reingestEntry('${encodeURIComponent(e.locator)}', '${filename}', this)" style="display:none">Reingest</button></td>
                        <td><a class="entry-link" href="${e.locator}" target="_blank" rel="noopener">link</a></td>
                    </tr>`;
                }).join('')}</tbody>
            </table>`;
        }

        async function checkAllStatuses() {
            // Collect all locators across all manifests
            const allLocators = [];
            const locatorMap = {}; // locator -> [{filename, idx}]
            allFiles.forEach((f, i) => {
                f.entries.forEach((e, j) => {
                    allLocators.push(e.locator);
                    if (!locatorMap[e.locator]) locatorMap[e.locator] = [];
                    locatorMap[e.locator].push({filename: f.filename, idx: j});
                });
            });

            if (!allLocators.length) return;

            try {
                const res = await fetch('/api/v1/curation/check-ingested', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({locators: allLocators})
                });
                const data = await res.json();
                const ingested = data.ingested || {};
                const details = data.details || {};

                // Populate status cache per filename
                allFiles.forEach(f => {
                    statusCache[f.filename] = { ingested: {}, details: {} };
                });
                for (const loc of allLocators) {
                    const entries = locatorMap[loc] || [];
                    for (const {filename} of entries) {
                        statusCache[filename].ingested[loc] = !!ingested[loc];
                        if (details[loc]) {
                            statusCache[filename].details[loc] = details[loc];
                        }
                    }
                }

                // Apply status to all manifests and update summary
                let totalIngested = 0;
                allFiles.forEach((f, i) => {
                    applyStatus(f.filename);
                    const cache = statusCache[f.filename];
                    const ingestedCount = f.entries.filter(e => cache.ingested[e.locator]).length;
                    totalIngested += ingestedCount;
                    const summaryEl = document.getElementById(`msummary-${i}`);
                    if (summaryEl) {
                        summaryEl.textContent = `${ingestedCount}/${f.entry_count} ingested`;
                        summaryEl.style.color = ingestedCount === f.entry_count ? '#2ecc71' : '#e67e22';
                    }
                });

                const totalEntries = allFiles.reduce((s, f) => s + f.entry_count, 0);
                document.getElementById('sum-ingested').textContent = totalIngested;
                document.getElementById('sum-pending').textContent = totalEntries - totalIngested;
            } catch (err) {
                console.error('Status check failed:', err);
            }
        }

        async function toggleCard(idx) {
            const card = document.querySelector(`.manifest-card[data-idx="${idx}"]`);
            card.classList.toggle('expanded');
        }

        function applyStatus(filename) {
            const cache = statusCache[filename];
            if (!cache) return;
            const ingested = cache.ingested || {};
            const details = cache.details || {};
            const card = document.querySelector(`.manifest-card[data-filename="${filename}"]`);
            if (!card) return;

            const rows = card.querySelectorAll('.entry-table tbody tr');
            rows.forEach((row, j) => {
                const dot = document.getElementById(`dot-${filename}-${j}`);
                const dateEl = document.getElementById(`date-${filename}-${j}`);
                const btnEl = document.getElementById(`rbtn-${filename}-${j}`);
                const locator = row.dataset.locator;
                if (!dot || !locator) return;

                dot.classList.remove('dot-loading');
                if (ingested[locator]) {
                    dot.classList.add('dot-ingested');
                    const d = details[locator];
                    if (d && d.fetched_at && dateEl) {
                        const date = new Date(d.fetched_at);
                        dateEl.textContent = date.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
                    } else if (dateEl) {
                        dateEl.textContent = 'Yes';
                    }
                    if (btnEl) btnEl.style.display = 'inline-block';
                } else {
                    dot.classList.add('dot-pending');
                    if (dateEl) dateEl.textContent = '-';
                    if (btnEl) btnEl.style.display = 'none';
                }
            });
        }

        async function ingestManifest(filename, btn) {
            btn.disabled = true;
            btn.textContent = 'Starting...';

            try {
                const res = await fetch('/api/v1/curation/ingest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        manifest_path: `data/manifests/${filename}`,
                        options: {skip_existing: true}
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Ingest failed');

                btn.textContent = 'Running...';
                activeJobs[data.job_id] = filename;
                showJobBanner(data.job_id, filename, 'Ingesting new');
                pollJob(data.job_id, filename, btn, 'Ingest New');
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Ingest New';
                alert('Ingest error: ' + err.message);
            }
        }

        async function reingestManifest(filename, btn) {
            if (!confirm(`Reingest ALL entries in ${filename.replace('.jsonl','').replace(/_/g,' ')}? This will re-fetch and re-process every source.`)) return;
            btn.disabled = true;
            btn.textContent = 'Starting...';

            try {
                const res = await fetch('/api/v1/curation/ingest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        manifest_path: `data/manifests/${filename}`,
                        options: {skip_existing: false}
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Reingest failed');

                btn.textContent = 'Running...';
                activeJobs[data.job_id] = filename;
                showJobBanner(data.job_id, filename, 'Reingesting');
                pollJob(data.job_id, filename, btn, 'Reingest All');
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Reingest All';
                alert('Reingest error: ' + err.message);
            }
        }

        async function reingestEntry(encodedLocator, filename, btn) {
            const locator = decodeURIComponent(encodedLocator);
            if (!confirm(`Reingest this source?\n${locator}`)) return;
            btn.disabled = true;
            btn.textContent = '...';

            try {
                const res = await fetch('/api/v1/curation/reingest-source', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({locator, manifest_file: filename})
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Reingest failed');

                showJobBanner(data.job_id, locator.split('/').pop() || 'source', 'Reingesting');
                pollSingleJob(data.job_id, filename, btn);
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Reingest';
                alert('Reingest error: ' + err.message);
            }
        }

        function showJobBanner(jobId, label, action) {
            const banner = document.getElementById('job-banner');
            const displayLabel = label.replace('.jsonl', '').replace(/_/g, ' ');
            document.getElementById('job-text').textContent = `${action} ${displayLabel}...`;
            document.getElementById('job-progress').style.width = '0%';
            document.getElementById('job-stats').textContent = '';
            banner.className = 'job-banner visible';
        }

        async function pollJob(jobId, filename, btn, btnLabel) {
            try {
                const res = await fetch(`/api/v1/curation/jobs/${jobId}`);
                const data = await res.json();
                const p = data.progress || {};
                const total = p.total || 1;
                const processed = (p.processed || 0) + (p.skipped || 0) + (p.failed || 0);
                const pct = Math.min(100, Math.round((processed / total) * 100));

                document.getElementById('job-progress').style.width = pct + '%';
                const parts = [`${processed}/${total}`];
                if (p.skipped) parts.push(`${p.skipped} skipped`);
                if (p.failed) parts.push(`${p.failed} failed`);
                document.getElementById('job-stats').textContent = parts.join(', ');

                if (data.status === 'completed') {
                    const banner = document.getElementById('job-banner');
                    const label = filename.replace('.jsonl', '').replace(/_/g, ' ');
                    document.getElementById('job-text').textContent = `Done: ${label}`;
                    banner.className = 'job-banner visible completed';
                    btn.disabled = false;
                    btn.textContent = btnLabel;
                    delete statusCache[filename];
                    await checkAllStatuses();
                    return;
                } else if (data.status === 'failed') {
                    const banner = document.getElementById('job-banner');
                    document.getElementById('job-text').textContent = 'Ingestion failed';
                    banner.className = 'job-banner visible failed';
                    btn.disabled = false;
                    btn.textContent = btnLabel;
                    return;
                }

                setTimeout(() => pollJob(jobId, filename, btn, btnLabel), 3000);
            } catch (err) {
                console.error('Poll error:', err);
                setTimeout(() => pollJob(jobId, filename, btn, btnLabel), 5000);
            }
        }

        async function pollSingleJob(jobId, filename, btn) {
            try {
                const res = await fetch(`/api/v1/curation/jobs/${jobId}`);
                const data = await res.json();

                if (data.status === 'completed') {
                    const banner = document.getElementById('job-banner');
                    document.getElementById('job-text').textContent = 'Reingest complete';
                    banner.className = 'job-banner visible completed';
                    btn.disabled = false;
                    btn.textContent = 'Reingest';
                    delete statusCache[filename];
                    await checkAllStatuses();
                    return;
                } else if (data.status === 'failed') {
                    const banner = document.getElementById('job-banner');
                    document.getElementById('job-text').textContent = 'Reingest failed';
                    banner.className = 'job-banner visible failed';
                    btn.disabled = false;
                    btn.textContent = 'Reingest';
                    return;
                }

                const p = data.progress || {};
                const total = p.total || 1;
                const processed = (p.processed || 0) + (p.skipped || 0) + (p.failed || 0);
                const pct = Math.min(100, Math.round((processed / total) * 100));
                document.getElementById('job-progress').style.width = pct + '%';

                setTimeout(() => pollSingleJob(jobId, filename, btn), 3000);
            } catch (err) {
                console.error('Poll error:', err);
                setTimeout(() => pollSingleJob(jobId, filename, btn), 5000);
            }
        }

        loadManifests();
    </script>
</body>
</html>
